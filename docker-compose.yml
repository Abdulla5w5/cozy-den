# Cozy Den full stack: Postgres + API + nginx frontend on one box.
#   Secrets come from a local, gitignored .env (see .env.example).
#   docker compose up --build -d
# Frontend:  http://<host>:8080     API health: http://<host>:8080/api/health
name: cozy-den

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cozyden
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: cozyden
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cozyden -d cozyden"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "4000"
      DATABASE_URL: postgres://cozyden:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@db:5432/cozyden
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      TABLE_FEE_CENTS: "500"
      PAYMENT_PROVIDER: mock
      # Only these emails sign in as staff (need a valid account + password too).
      STAFF_ALLOWED_EMAILS: ${STAFF_ALLOWED_EMAILS:-staff@cozyden.local}
      # Google Sign-In: verifies ID tokens against this client id (not sensitive).
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}

  frontend:
    build:
      context: ./frontend
      args:
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  pgdata:
